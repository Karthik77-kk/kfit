name: PR Quality Gate

# ─────────────────────────────────────────────────────────────────────────────
# The REAL, hard-to-fool merge gate. One required job: "Verify (analyze + test)".
# Runs on the real head SHA, resets on every push, cannot be faked by a comment.
#
# Hard checks (any failure blocks merge):
#   1. Secret scan      — no hardcoded tokens/keys in lib/ (the HF-token leak class)
#   2. App identity     — build_apk.yml keeps applicationId + namespace pinned to
#                         com.example.karthik_fitness (changing it orphans installs)
#   3. flutter analyze  — warnings/errors fail (info-lints allowed)
#   4. flutter test     — full suite, with coverage
#   5. Coverage floor   — line coverage must stay >= COVERAGE_MIN (tests can't vanish)
#
# versionCode is auto-derived in build_apk.yml (commit count) — no manual bumps,
# releases are tagged ascending as v<major.minor>.<count> (e.g. v2.3.239).
#
# Code review is GitHub Copilot (advisory) per .github/copilot-instructions.md.
# A broken release APK can never ship: build_apk.yml only releases on success.
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-quality-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  COVERAGE_MIN: "38.0"   # ratchet: raise as coverage grows (currently ~40%)

jobs:
  verify:
    name: Verify (analyze + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changed
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          FILES=$(git diff --name-only "$BASE" "$HEAD")
          echo "Changed files:"; echo "$FILES"
          if echo "$FILES" | grep -qE '(\.dart$|^pubspec\.yaml$)'; then
            echo "code=true"  >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$FILES" | grep -qE '^pubspec\.yaml$'; then
            echo "pubspec=true"  >> "$GITHUB_OUTPUT"
          else
            echo "pubspec=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Secret scan (no hardcoded credentials in lib/)
        run: |
          # HF tokens, GitHub PATs, AWS keys, private keys. lib/ is Dart source —
          # there is never a legit reason for a raw credential to live here.
          PATTERN='hf_[A-Za-z0-9]{30}|ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{40}|AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY-----'
          # Lines tagged `gate-allow-token` are intentional, allowlisted bundled
          # credentials (e.g. the gated HF model-download token) — any OTHER match fails.
          if grep -rEn "$PATTERN" lib/ | grep -v 'gate-allow-token'; then
            echo "::error::Hardcoded credential detected in lib/. Move it out of source, or tag the line // gate-allow-token if it is an intentional bundled token."
            exit 1
          fi
          echo "✅ No unexpected hardcoded credentials in lib/"

      - name: App identity guard (applicationId + namespace pinned)
        run: |
          F=.github/workflows/build_apk.yml
          grep -q 'applicationId "com.example.karthik_fitness"' "$F" || { echo "::error::applicationId must stay com.example.karthik_fitness (changing it orphans every install)."; exit 1; }
          grep -q 'namespace "com.example.karthik_fitness"' "$F"     || { echo "::error::namespace must stay com.example.karthik_fitness (must match committed .kt package)."; exit 1; }
          echo "✅ App identity pinned"

      # Version integrity check removed: the Android versionCode is now auto-derived
      # in build_apk.yml from the commit count (always a unique, strictly-increasing
      # integer). PRs no longer hand-bump pubspec, so there is nothing to validate
      # and parallel PRs can never collide on a version.

      - name: Set up Java
        if: steps.changed.outputs.code == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        if: steps.changed.outputs.code == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Install dependencies
        if: steps.changed.outputs.code == 'true'
        run: flutter pub get

      - name: Analyze (warnings/errors fail; info-lints allowed)
        if: steps.changed.outputs.code == 'true'
        run: flutter analyze --no-fatal-infos

      - name: Test (full suite, with coverage)
        if: steps.changed.outputs.code == 'true'
        run: flutter test --coverage

      - name: Coverage floor
        if: steps.changed.outputs.code == 'true'
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "::error::coverage/lcov.info missing — tests did not produce coverage."
            exit 1
          fi
          PCT=$(awk -F: '/^LF:/{lf+=$2} /^LH:/{lh+=$2} END{ if(lf>0) printf "%.1f", lh/lf*100; else print "0" }' coverage/lcov.info)
          echo "Line coverage: ${PCT}% (floor ${COVERAGE_MIN}%)"
          if awk "BEGIN{exit !($PCT < $COVERAGE_MIN)}"; then
            echo "::error::Coverage ${PCT}% is below the ${COVERAGE_MIN}% floor. Add tests for your change."
            exit 1
          fi
          echo "✅ Coverage ${PCT}% >= ${COVERAGE_MIN}%"

      - name: Docs-only PR
        if: steps.changed.outputs.code == 'false'
        run: echo "No Dart/pubspec changes — analyze/test skipped. Identity, secret & version checks still ran."
