name: Auto-Merge on Dual Agent Approval

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  issue_comment:
    types: [created, edited]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Check Agent Approvals
        id: check-approvals
        uses: actions/github-script@v7
        with:
          script: |
            // Handle both pull_request and issue_comment events
            const pr = context.payload.pull_request || context.issue;
            if (!pr) {
              console.log('No PR found');
              return;
            }

            // Get all comments on this PR
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });

            console.log(`Checking ${comments.length} comments for approvals`);

            // Check for code review approval
            let codeReviewApproved = false;
            let testingApproved = false;

            for (const comment of comments) {
              const body = comment.body;

              // Code Review Agent approval
              if (body.includes('✅ Code Review Agent: APPROVED')) {
                codeReviewApproved = true;
                console.log('✅ Code Review Agent approval found');
              }

              // Testing Agent approval
              if (body.includes('✅ Testing Agent: VERIFIED')) {
                testingApproved = true;
                console.log('✅ Testing Agent approval found');
              }
            }

            core.setOutput('code-review-approved', codeReviewApproved);
            core.setOutput('testing-approved', testingApproved);
            core.setOutput('both-approved', codeReviewApproved && testingApproved);

      - name: Enable Auto-Merge (Squash)
        if: steps.check-approvals.outputs.both-approved == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request || context.issue;
            if (!pr) return;

            console.log('✅ Both agents approved - enabling auto-merge');

            // Enable auto-merge with squash strategy
            try {
              await github.rest.pulls.enableAutoMerge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
              });
              console.log('✅ Auto-merge enabled (squash strategy)');
            } catch (error) {
              console.log(`Auto-merge might already be enabled or failed: ${error.message}`);
            }

      - name: Comment Merge Status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request || context.issue;
            if (!pr) return;

            const codeReviewApproved = '${{ steps.check-approvals.outputs.code-review-approved }}' === 'true';
            const testingApproved = '${{ steps.check-approvals.outputs.testing-approved }}' === 'true';
            const bothApproved = '${{ steps.check-approvals.outputs.both-approved }}' === 'true';

            let status = '';
            if (bothApproved) {
              status = '✅ **Both agents approved** — Auto-merge enabled (squash strategy). PR will merge automatically.';
            } else {
              const codeStatus = codeReviewApproved ? '✅' : '⏳';
              const testStatus = testingApproved ? '✅' : '⏳';
              status = `⏳ **Waiting for approvals**: Code Review ${codeStatus} | Testing ${testStatus}`;
            }

            // Check if we already commented
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });

            const existingStatusComment = comments.find(c =>
              c.body.includes('**Both agents approved**') ||
              c.body.includes('**Waiting for approvals**')
            );

            if (existingStatusComment && bothApproved) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingStatusComment.id,
                body: status,
              });
            } else if (!existingStatusComment) {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: status,
              });
            }

            console.log(status);
