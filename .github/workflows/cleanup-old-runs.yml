name: Cleanup Old Workflow Runs

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly, Sunday 2 AM UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup Old Workflow Runs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            console.log(`Cleaning up old workflow runs for ${owner}/${repo}...`);

            // Get all workflow runs
            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              per_page: 100,
            });

            let deleted = 0;
            let kept = 0;

            // Keep last 5 successful runs per workflow, delete older ones
            const runsPerWorkflow = {};

            for (const run of runs.data.workflow_runs) {
              const workflowId = run.workflow_id;

              if (!runsPerWorkflow[workflowId]) {
                runsPerWorkflow[workflowId] = [];
              }

              if (run.conclusion === 'success') {
                runsPerWorkflow[workflowId].push(run);
              }
            }

            // Delete runs older than the last 5 successful ones
            for (const run of runs.data.workflow_runs) {
              const workflowId = run.workflow_id;
              const successfulRuns = runsPerWorkflow[workflowId] || [];

              if (successfulRuns.length > 5 &&
                  successfulRuns.indexOf(run) >= 5) {
                try {
                  await github.rest.actions.deleteWorkflowRun({
                    owner,
                    repo,
                    run_id: run.id,
                  });
                  console.log(`✅ Deleted: ${run.name} (${run.conclusion})`);
                  deleted++;
                } catch (error) {
                  console.log(`⚠️ Could not delete run ${run.id}: ${error.message}`);
                }
              } else {
                kept++;
              }
            }

            console.log(`\n✅ Cleanup complete: Deleted ${deleted} runs, kept ${kept} recent runs`);
