name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: stable
          cache: true

      - name: Generate Android scaffold
        run: |
          cp pubspec.yaml pubspec_backup.yaml
          cp -r lib lib_backup
          flutter create --project-name karthik_fitness --no-pub .
          cp pubspec_backup.yaml pubspec.yaml
          rm -rf lib
          cp -r lib_backup lib
          rm -rf lib_backup pubspec_backup.yaml

      - name: Inject Android permissions and widget configuration
        run: |
          # ── 1. Patch AndroidManifest.xml (permission + widget receivers) ───────
          python3 - << 'PYEOF'
          import re, sys
          path = 'android/app/src/main/AndroidManifest.xml'
          txt  = open(path).read()

          # Add ACTIVITY_RECOGNITION permission after <manifest ...>
          if 'ACTIVITY_RECOGNITION' not in txt:
              txt = txt.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n'
                  '    <uses-permission android:name="android.permission.ACTIVITY_RECOGNITION"/>'
              )

          # Add widget receivers before </application>
          receivers = (
              '\n        <receiver android:name=".WaterWidget" android:exported="true">'
              '\n            <intent-filter>'
              '\n                <action android:name="android.appwidget.action.APPWIDGET_UPDATE"/>'
              '\n            </intent-filter>'
              '\n            <meta-data android:name="android.appwidget.provider"'
              '\n                android:resource="@xml/water_widget_info"/>'
              '\n        </receiver>'
              '\n        <receiver android:name=".StepsWidget" android:exported="true">'
              '\n            <intent-filter>'
              '\n                <action android:name="android.appwidget.action.APPWIDGET_UPDATE"/>'
              '\n            </intent-filter>'
              '\n            <meta-data android:name="android.appwidget.provider"'
              '\n                android:resource="@xml/steps_widget_info"/>'
              '\n        </receiver>'
          )
          if 'WaterWidget' not in txt:
              txt = txt.replace('</application>', receivers + '\n    </application>')

          open(path, 'w').write(txt)
          print('AndroidManifest.xml patched OK')
          PYEOF

          # ── 2. Create res directories ─────────────────────────────────────────
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/xml

          # ── 3. Water widget layout ────────────────────────────────────────────
          cat > android/app/src/main/res/layout/water_widget.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#1C1C1E"
              android:orientation="vertical"
              android:gravity="center"
              android:padding="12dp">
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="💧"
                  android:textSize="26sp"/>
              <TextView
                  android:id="@+id/water_amount"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="0 ml"
                  android:textColor="#40C8E0"
                  android:textSize="20sp"
                  android:textStyle="bold"/>
              <TextView
                  android:id="@+id/water_goal"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="/ 2500 ml"
                  android:textColor="#8E8E93"
                  android:textSize="11sp"/>
          </LinearLayout>
          XMLEOF

          # ── 4. Steps widget layout ────────────────────────────────────────────
          cat > android/app/src/main/res/layout/steps_widget.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#1C1C1E"
              android:orientation="vertical"
              android:gravity="center"
              android:padding="12dp">
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="👟"
                  android:textSize="26sp"/>
              <TextView
                  android:id="@+id/steps_count"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="0"
                  android:textColor="#30D158"
                  android:textSize="22sp"
                  android:textStyle="bold"/>
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="steps today"
                  android:textColor="#8E8E93"
                  android:textSize="11sp"/>
          </LinearLayout>
          XMLEOF

          # ── 5. Widget info XMLs ───────────────────────────────────────────────
          cat > android/app/src/main/res/xml/water_widget_info.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <appwidget-provider xmlns:android="http://schemas.android.com/apk/res/android"
              android:minWidth="110dp"
              android:minHeight="110dp"
              android:updatePeriodMillis="1800000"
              android:initialLayout="@layout/water_widget"
              android:resizeMode="horizontal|vertical"
              android:widgetCategory="home_screen"/>
          XMLEOF

          cat > android/app/src/main/res/xml/steps_widget_info.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <appwidget-provider xmlns:android="http://schemas.android.com/apk/res/android"
              android:minWidth="110dp"
              android:minHeight="110dp"
              android:updatePeriodMillis="1800000"
              android:initialLayout="@layout/steps_widget"
              android:resizeMode="horizontal|vertical"
              android:widgetCategory="home_screen"/>
          XMLEOF

          # ── 6. Kotlin HomeWidgetProvider classes (home_widget 0.9.x API) ──────
          PKG_DIR="android/app/src/main/kotlin/com/example/karthik_fitness"
          mkdir -p "$PKG_DIR"

          cat > "$PKG_DIR/WaterWidget.kt" << 'KTEOF'
          package com.example.karthik_fitness

          import android.appwidget.AppWidgetManager
          import android.content.Context
          import android.content.SharedPreferences
          import android.widget.RemoteViews
          import es.antonborri.home_widget.HomeWidgetProvider

          class WaterWidget : HomeWidgetProvider() {
              override fun onUpdate(
                  context: Context,
                  appWidgetManager: AppWidgetManager,
                  appWidgetIds: IntArray,
                  widgetData: SharedPreferences,
              ) {
                  for (id in appWidgetIds) {
                      val views = RemoteViews(context.packageName, R.layout.water_widget)
                      val ml = widgetData.getInt("water_ml", 0)
                      views.setTextViewText(R.id.water_amount, "$ml ml")
                      views.setTextViewText(R.id.water_goal, "/ 2500 ml goal")
                      appWidgetManager.updateAppWidget(id, views)
                  }
              }
          }
          KTEOF

          cat > "$PKG_DIR/StepsWidget.kt" << 'KTEOF'
          package com.example.karthik_fitness

          import android.appwidget.AppWidgetManager
          import android.content.Context
          import android.content.SharedPreferences
          import android.widget.RemoteViews
          import es.antonborri.home_widget.HomeWidgetProvider

          class StepsWidget : HomeWidgetProvider() {
              override fun onUpdate(
                  context: Context,
                  appWidgetManager: AppWidgetManager,
                  appWidgetIds: IntArray,
                  widgetData: SharedPreferences,
              ) {
                  for (id in appWidgetIds) {
                      val views = RemoteViews(context.packageName, R.layout.steps_widget)
                      val steps = widgetData.getInt("steps_today", 0)
                      views.setTextViewText(R.id.steps_count, "$steps")
                      appWidgetManager.updateAppWidget(id, views)
                  }
              }
          }
          KTEOF

          echo "Android widget configuration injected successfully"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: karthik-fitness-app
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
