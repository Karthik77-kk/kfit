name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the commit count (=versionCode) is correct

      - name: Compute version (auto, ascending)
        id: ver
        run: |
          # versionCode = number of commits on main — strictly increases every merge,
          # so we never hand-bump pubspec and PRs can never collide on a version.
          CODE=$(git rev-list --count HEAD)
          NAME=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | sed 's/+.*//')
          # Ascending semantic-looking tag: v<major.minor>.<code>  e.g. v2.3.239
          TAG="v${NAME%.*}.${CODE}"
          echo "code=${CODE}"  >> $GITHUB_OUTPUT
          echo "tag=${TAG}"    >> $GITHUB_OUTPUT
          echo "label=${TAG}"  >> $GITHUB_OUTPUT
          echo "Release will be ${TAG} (versionCode ${CODE})"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Generate Android scaffold (preserving committed android/)
        run: |
          # Back up our committed android/ (has correct manifest, BootReceiver, and build config)
          cp -r android android_committed
          cp pubspec.yaml pubspec_backup.yaml
          cp -r lib lib_backup
          flutter create --project-name kfit --no-pub .
          cp pubspec_backup.yaml pubspec.yaml
          rm -rf lib
          cp -r lib_backup lib
          rm -rf lib_backup pubspec_backup.yaml
          # Restore committed files that flutter create overwrites
          cp android_committed/app/src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          # Replace flutter-create kotlin sources entirely to avoid duplicate BootReceiver.kt.
          # flutter create does not delete non-template files, so BootReceiver.kt survives
          # at its committed path while the bash one-liner also placed a copy at the wrong
          # path (com/BootReceiver.kt) — causing a Kotlin Redeclaration error at compile time.
          rm -rf android/app/src/main/kotlin/
          cp -r android_committed/app/src/main/kotlin/ android/app/src/main/kotlin/
          # Restore committed Gradle/Kotlin/AGP versions (already at 9.1, 9.0.1, 2.3.20)
          cp android_committed/settings.gradle.kts android/settings.gradle.kts
          cp android_committed/build.gradle.kts android/build.gradle.kts
          cp android_committed/gradle/wrapper/gradle-wrapper.properties android/gradle/wrapper/gradle-wrapper.properties
          rm -rf android_committed
          echo "=== settings.gradle.kts ==="
          cat android/settings.gradle.kts
          echo "=== gradle-wrapper.properties ==="
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Configure app signing + patch app name
        # Keystore + credentials come from encrypted repo secrets (moved out of this
        # file — it used to hold the base64 keystore and its plaintext password
        # directly in committed source, which any repo viewer could read). Same
        # signing key as always, so existing installs keep updating in place.
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          # Decode persistent keystore (same key every build = APK updates in place)
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/kfitness.jks

          # Create key.properties
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=kfitness.jks\n' \
            "$ANDROID_KEYSTORE_PASSWORD" "$ANDROID_KEYSTORE_PASSWORD" "$ANDROID_KEY_ALIAS" > android/key.properties

          # Write complete known-good build.gradle using a list of lines (no triple-quote
          # block that would violate YAML indentation rules for run: | blocks).
          python3 - << 'PYEOF'
          import os
          kts = 'android/app/build.gradle.kts'
          groovy = 'android/app/build.gradle'
          if os.path.exists(kts):
              os.remove(kts)
              print('Removed build.gradle.kts')
          lines = [
              'plugins {',
              '    id "com.android.application"',
              '    id "kotlin-android"',
              '    id "dev.flutter.flutter-gradle-plugin"',
              '}',
              '',
              'def keystoreProperties = new Properties()',
              "def keystorePropertiesFile = rootProject.file('key.properties')",
              'if (keystorePropertiesFile.exists()) {',
              '    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))',
              '}',
              '',
              'android {',
              '    namespace "com.example.karthik_fitness"',
              '    compileSdk flutter.compileSdkVersion',
              '    ndkVersion flutter.ndkVersion',
              '',
              '    compileOptions {',
              '        coreLibraryDesugaringEnabled true',
              '        sourceCompatibility JavaVersion.VERSION_11',
              '        targetCompatibility JavaVersion.VERSION_11',
              '    }',
              '',
              '    kotlinOptions {',
              '        jvmTarget = "11"',
              '    }',
              '',
              '    defaultConfig {',
              '        applicationId "com.example.karthik_fitness"',
              '        minSdk flutter.minSdkVersion',
              '        targetSdk flutter.targetSdkVersion',
              '        versionCode flutter.versionCode',
              '        versionName flutter.versionName',
              '        ndk {',
              '            abiFilters "arm64-v8a"',
              '        }',
              '    }',
              '',
              '    signingConfigs {',
              '        release {',
              "            keyAlias keystoreProperties['keyAlias']",
              "            keyPassword keystoreProperties['keyPassword']",
              "            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null",
              "            storePassword keystoreProperties['storePassword']",
              '        }',
              '    }',
              '',
              '    buildTypes {',
              '        release {',
              '            signingConfig signingConfigs.release',
              '            minifyEnabled false',
              '            shrinkResources false',
              '        }',
              '    }',
              '',
              '    // Strip non-arm64 native libs at packaging. --target-platform',
              '    // android-arm64 only drops Flutter-built libs; the MediaPipe/',
              '    // flutter_gemma .so ship inside an AAR and are packaged by Gradle,',
              '    // which ndk.abiFilters does NOT filter — this does (~46 MB saved).',
              '    packagingOptions {',
              '        jniLibs {',
              "            excludes += ['**/x86_64/**', '**/armeabi-v7a/**']",
              '        }',
              '    }',
              '}',
              '',
              'flutter {',
              '    source "../.."',
              '}',
              '',
              'dependencies {',
              '    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"',
              '}',
              '',
              'configurations.all {',
              '    exclude group: "com.google.mediapipe", module: "tasks-vision-image-generator"',
              '}',
          ]
          open(groovy, 'w').write('\n'.join(lines) + '\n')
          print('build.gradle written with release signing + desugaring')
          PYEOF

          # Patch app label to "K"
          sed -i 's/android:label="[^"]*"/android:label="K"/' android/app/src/main/AndroidManifest.xml

          # Patch AndroidManifest with required permissions (pedometer only).
          python3 - << 'PYEOF'
          path = 'android/app/src/main/AndroidManifest.xml'
          txt = open(path).read()
          needed = [
              'android.permission.ACTIVITY_RECOGNITION',
          ]
          anchor = '<manifest xmlns:android="http://schemas.android.com/apk/res/android">'
          perms = anchor
          for p in needed:
              if p not in txt:
                  perms += f'\n    <uses-permission android:name="{p}"/>'
          txt = txt.replace(anchor, perms, 1)
          open(path, 'w').write(txt)
          print('Manifest patched with pedometer permission')
          PYEOF

          echo "=== Signing + label + permissions configured ==="

      - name: Patch MainActivity for battery optimization method channel
        run: |
          # Find and replace the generated MainActivity.kt with one that exposes
          # battery optimization and notification settings via method channel
          python3 - << 'PYEOF'
          import os, glob
          # Find MainActivity.kt
          matches = glob.glob('android/app/src/main/kotlin/**/*.kt', recursive=True)
          main_activity = next((f for f in matches if 'MainActivity' in f), None)
          if not main_activity:
              print('MainActivity.kt not found, skipping')
          else:
              pkg_line = open(main_activity).readline().strip()  # package com.example.xxx
              lines = [
                  pkg_line,
                  '',
                  'import android.content.Intent',
                  'import android.net.Uri',
                  'import android.os.Build',
                  'import android.os.PowerManager',
                  'import android.provider.Settings',
                  'import io.flutter.embedding.android.FlutterActivity',
                  'import io.flutter.embedding.engine.FlutterEngine',
                  'import io.flutter.plugin.common.MethodChannel',
                  '',
                  'class MainActivity: FlutterActivity() {',
                  '    private val CHANNEL = "com.kfitness/battery"',
                  '',
                  '    override fun configureFlutterEngine(flutterEngine: FlutterEngine) {',
                  '        super.configureFlutterEngine(flutterEngine)',
                  '        MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL)',
                  '            .setMethodCallHandler { call, result ->',
                  '                when (call.method) {',
                  '                    "requestIgnoreBatteryOptimizations" -> {',
                  '                        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {',
                  '                            val pm = getSystemService(POWER_SERVICE) as PowerManager',
                  '                            if (!pm.isIgnoringBatteryOptimizations(packageName)) {',
                  '                                val intent = Intent(',
                  '                                    Settings.ACTION_REQUEST_IGNORE_BATTERY_OPTIMIZATIONS',
                  '                                )',
                  '                                intent.data = Uri.parse("package:$packageName")',
                  '                                startActivity(intent)',
                  '                            }',
                  '                        }',
                  '                        result.success(true)',
                  '                    }',
                  '                    "isIgnoringBatteryOptimizations" -> {',
                  '                        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {',
                  '                            val pm = getSystemService(POWER_SERVICE) as PowerManager',
                  '                            result.success(pm.isIgnoringBatteryOptimizations(packageName))',
                  '                        } else {',
                  '                            result.success(true)',
                  '                        }',
                  '                    }',
                  '                    "openNotificationSettings" -> {',
                  '                        val intent = Intent(Settings.ACTION_APP_NOTIFICATION_SETTINGS)',
                  '                        intent.putExtra(Settings.EXTRA_APP_PACKAGE, packageName)',
                  '                        startActivity(intent)',
                  '                        result.success(true)',
                  '                    }',
                  '                    "openExactAlarmSettings" -> {',
                  '                        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S) {',
                  '                            val intent = Intent(Settings.ACTION_REQUEST_SCHEDULE_EXACT_ALARM)',
                  '                            intent.data = Uri.parse("package:$packageName")',
                  '                            startActivity(intent)',
                  '                        }',
                  '                        result.success(true)',
                  '                    }',
                  '                    else -> result.notImplemented()',
                  '                }',
                  '            }',
                  '    }',
                  '}',
              ]
              content = '\n'.join(lines) + '\n'
              open(main_activity, 'w').write(content)
              print(f'Patched {main_activity}')
          PYEOF

      - name: Verify build.gradle signing config
        run: |
          echo "=== app/build.gradle (must contain release signingConfig) ==="
          cat android/app/build.gradle
          grep -q "signingConfigs.release" android/app/build.gradle && echo "✅ Release signing confirmed" || (echo "❌ Release signing MISSING — build will use debug key!" && exit 1)

      - name: Generate app icon (grey background, black K)
        run: |
          pip install Pillow --break-system-packages -q
          python3 - << 'PYEOF'
          import os
          from PIL import Image, ImageDraw, ImageFont
          def create_k_icon(size):
              bg = (90, 90, 90, 255)
              fg = (0, 0, 0, 255)
              img = Image.new('RGBA', (size, size), bg)
              draw = ImageDraw.Draw(img)
              font = None
              for fpath in [
                  '/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf',
                  '/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf',
                  '/usr/share/fonts/truetype/freefont/FreeSansBold.ttf',
              ]:
                  if os.path.exists(fpath):
                      font = ImageFont.truetype(fpath, int(size * 0.62))
                      break
              if font:
                  bbox = draw.textbbox((0, 0), 'K', font=font)
                  tw = bbox[2] - bbox[0]
                  th = bbox[3] - bbox[1]
                  draw.text(((size - tw) / 2 - bbox[0], (size - th) / 2 - bbox[1]), 'K', fill=fg, font=font)
              else:
                  m, s = size * 0.18, max(size * 0.13, 3)
                  cx = size * 0.46
                  draw.rectangle([m, m, m+s, size-m], fill=fg)
                  draw.polygon([(cx, size*0.5), (cx+s*0.6, size*0.5), (size-m, m), (size-m-s, m)], fill=fg)
                  draw.polygon([(cx, size*0.5), (cx+s*0.6, size*0.5), (size-m, size-m), (size-m-s, size-m)], fill=fg)
              return img
          sizes = {'mipmap-mdpi': 48, 'mipmap-hdpi': 72, 'mipmap-xhdpi': 96, 'mipmap-xxhdpi': 144, 'mipmap-xxxhdpi': 192}
          for dirname, sz in sizes.items():
              dpath = 'android/app/src/main/res/' + dirname
              os.makedirs(dpath, exist_ok=True)
              icon = create_k_icon(sz).convert('RGB')
              icon.save(dpath + '/ic_launcher.png')
              icon.save(dpath + '/ic_launcher_round.png')
          print('App icons generated for all densities')
          PYEOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        # --build-number sets the Android versionCode from the auto-computed
        # commit count (overrides pubspec).
        # --target-platform android-arm64: ship a single-ABI APK. Without it the
        # Flutter Gradle plugin builds all three ABIs (arm/arm64/x64) and overrides
        # the manual `ndk.abiFilters arm64-v8a` in the generated build.gradle — which
        # is why x86_64 (emulator-only) and armeabi-v7a (32-bit, can't run the ~600 MB
        # model anyway) were still packaged, ~90 MB of dead weight. arm64-v8a is the
        # only arch a real target device uses.
        # --obfuscate --split-debug-info: strips readable Dart symbol names from
        # the compiled binary (official Flutter release hardening). Debug symbols
        # are kept as a short-lived artifact below so a stack trace could still be
        # decoded later if ever needed.
        # Secrets are base64-encoded before injection so they don't sit as
        # plaintext, grep-able strings inside the compiled APK (dart-define values
        # are embedded verbatim as constants otherwise). The app decodes them at
        # runtime (see e.g. GeminiVisionService._key) — same secret values, same
        # behavior, just not a raw match for automated token scanners that scrape
        # public APKs for literal credential patterns.
        run: |
          b64() { printf '%s' "$1" | base64 -w 0; }
          flutter build apk --release --target-platform android-arm64 --no-tree-shake-icons \
            --obfuscate --split-debug-info=build/symbols \
            --build-number=${{ steps.ver.outputs.code }} \
            --dart-define=HF_TOKEN_B64=$(b64 "${{ secrets.HF_TOKEN }}") \
            --dart-define=FDC_API_KEY_B64=$(b64 "${{ secrets.FDC_API_KEY }}") \
            --dart-define=GH_BACKUP_TOKEN_B64=$(b64 "${{ secrets.GH_BACKUP_TOKEN }}") \
            --dart-define=GH_BACKUP_REPO_B64=$(b64 "${{ secrets.GH_BACKUP_REPO }}") \
            --dart-define=GEMINI_API_KEY_B64=$(b64 "${{ secrets.GEMINI_API_KEY }}")

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols
          path: build/symbols
          retention-days: 1

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/kfit.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kfit
          path: build/app/outputs/flutter-apk/kfit.apk
          # 1 day, not 30: the APK is permanently attached to the GitHub Release,
          # so this artifact is just for same-day debugging. At ~127 MB/build the
          # old 30-day retention piled up to ~6 GB and tripped the account storage
          # quota, which silently stopped Actions from dispatching new runs.
          retention-days: 1

      - name: Verify APK exists before release
        run: |
          if [ ! -f build/app/outputs/flutter-apk/kfit.apk ]; then
            echo "❌ ERROR: kfit.apk not found at build/app/outputs/flutter-apk/kfit.apk"
            ls -lh build/app/outputs/flutter-apk/ || echo "Directory does not exist"
            exit 1
          fi
          APK_SIZE=$(du -h build/app/outputs/flutter-apk/kfit.apk | cut -f1)
          echo "✅ APK verified: $APK_SIZE"

      - name: Compose dynamic release notes
        id: notes
        run: |
          set -e
          # Previous release tag (this run's release doesn't exist yet, so
          # `gh release view` returns the most recent prior release).
          PREV=$(gh release view --json tagName -q .tagName 2>/dev/null || true)
          echo "Previous release: ${PREV:-<none>}"
          if [ -n "$PREV" ] && git merge-base --is-ancestor "$PREV" HEAD 2>/dev/null; then
            RANGE="${PREV}..HEAD"
          else
            RANGE="HEAD~10..HEAD"
          fi
          # Each squash-merged PR is one commit whose subject is the PR title.
          # Strip the "Build N: " prefix and "(#NN)" suffix for a clean changelog.
          CHANGES=$(git log "$RANGE" --no-merges --pretty=format:'%s' \
            | grep -viE '^(Merge|wip|fixup)' \
            | sed -E 's/^Build [0-9]+:[[:space:]]*//; s/[[:space:]]*\(#[0-9]+\)$//' \
            | sed -E 's/^/- /' \
            | head -15)
          [ -z "$CHANGES" ] && CHANGES="- Maintenance and improvements"
          # Actual APK size (dynamic — no more hardcoded ~295 MB).
          BYTES=$(stat -c%s build/app/outputs/flutter-apk/kfit.apk)
          MB=$(awk -v b="$BYTES" 'BEGIN{printf "%.0f", b/1048576}')
          {
            echo "### What's new in ${{ steps.ver.outputs.tag }}"
            echo ""
            echo "$CHANGES"
            echo ""
            echo "---"
            echo "~${MB} MB · Requires Android 8.0+ · Includes on-device Gemma 3 AI model"
            echo ""
            echo "### Install"
            echo "1. Download \`kfit.apk\` below"
            echo "2. Android Settings → Install unknown apps → Allow"
            echo "3. Tap the downloaded file to install"
          } > release_notes.md
          echo "----- release_notes.md -----"
          cat release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release with APK
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            build/app/outputs/flutter-apk/kfit.apk \
            --title "${{ steps.ver.outputs.label }}" \
            --notes-file release_notes.md \
            --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
