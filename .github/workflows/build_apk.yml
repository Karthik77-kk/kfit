name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: stable
          cache: true

      - name: Generate Android scaffold
        run: |
          cp pubspec.yaml pubspec_backup.yaml
          cp -r lib lib_backup
          flutter create --project-name karthik_fitness --no-pub .
          cp pubspec_backup.yaml pubspec.yaml
          rm -rf lib
          cp -r lib_backup lib
          rm -rf lib_backup pubspec_backup.yaml

      - name: Bump Kotlin, AGP, and Gradle versions
        run: |
          # home_widget <0.9.0 compiled with Kotlin ~2.0.x; bump compiler to match
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*" apply false/id "org.jetbrains.kotlin.android" version "2.0.21" apply false/' android/settings.gradle
          # work-runtime-ktx 2.11.x (from flutter_local_notifications) requires AGP 8.6.0+
          # Flutter 3.27.0 scaffold generates AGP 8.1.0; bump to 8.6.0
          sed -i 's/id "com.android.application" version "[^"]*" apply false/id "com.android.application" version "8.6.0" apply false/' android/settings.gradle
          # AGP 8.6.0 requires Gradle 8.7; Flutter 3.27.0 scaffold generates Gradle 8.3
          sed -i 's|gradle-[0-9.]*-all\.zip|gradle-8.7-all.zip|' android/gradle/wrapper/gradle-wrapper.properties
          sed -i 's|gradle-[0-9.]*-bin\.zip|gradle-8.7-all.zip|' android/gradle/wrapper/gradle-wrapper.properties
          echo "=== settings.gradle after patches ==="
          cat android/settings.gradle
          echo "=== gradle-wrapper.properties after patch ==="
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Enable core library desugaring (required by flutter_local_notifications)
        run: |
          # Insert coreLibraryDesugaringEnabled right after "compileOptions {" line
          sed -i '/compileOptions {/a\\        coreLibraryDesugaringEnabled true' android/app/build.gradle
          # Append the coreLibraryDesugaring dependency block
          printf '\ndependencies {\n    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"\n}\n' >> android/app/build.gradle
          # Patch ACTIVITY_RECOGNITION permission into AndroidManifest
          python3 - << 'PYEOF'
          path = 'android/app/src/main/AndroidManifest.xml'
          txt  = open(path).read()
          if 'ACTIVITY_RECOGNITION' not in txt:
              txt = txt.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n'
                  '    <uses-permission android:name="android.permission.ACTIVITY_RECOGNITION"/>'
              )
          open(path, 'w').write(txt)
          print('AndroidManifest.xml patched OK')
          PYEOF
          echo "=== app/build.gradle after desugaring patch ==="
          cat android/app/build.gradle

      - name: Generate app icon (grey background, black K)
        run: |
          pip install Pillow --break-system-packages -q
          python3 - << 'PYEOF'
          import os
          from PIL import Image, ImageDraw, ImageFont
          def create_k_icon(size):
              bg = (90, 90, 90, 255)
              fg = (0, 0, 0, 255)
              img = Image.new('RGBA', (size, size), bg)
              draw = ImageDraw.Draw(img)
              font = None
              for fpath in [
                  '/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf',
                  '/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf',
                  '/usr/share/fonts/truetype/freefont/FreeSansBold.ttf',
              ]:
                  if os.path.exists(fpath):
                      font = ImageFont.truetype(fpath, int(size * 0.62))
                      break
              if font:
                  bbox = draw.textbbox((0, 0), 'K', font=font)
                  tw = bbox[2] - bbox[0]
                  th = bbox[3] - bbox[1]
                  draw.text(((size - tw) / 2 - bbox[0], (size - th) / 2 - bbox[1]), 'K', fill=fg, font=font)
              else:
                  m, s = size * 0.18, max(size * 0.13, 3)
                  cx = size * 0.46
                  draw.rectangle([m, m, m+s, size-m], fill=fg)
                  draw.polygon([(cx, size*0.5), (cx+s*0.6, size*0.5), (size-m, m), (size-m-s, m)], fill=fg)
                  draw.polygon([(cx, size*0.5), (cx+s*0.6, size*0.5), (size-m, size-m), (size-m-s, size-m)], fill=fg)
              return img
          sizes = {'mipmap-mdpi': 48, 'mipmap-hdpi': 72, 'mipmap-xhdpi': 96, 'mipmap-xxhdpi': 144, 'mipmap-xxxhdpi': 192}
          for dirname, sz in sizes.items():
              dpath = 'android/app/src/main/res/' + dirname
              os.makedirs(dpath, exist_ok=True)
              icon = create_k_icon(sz).convert('RGB')
              icon.save(dpath + '/ic_launcher.png')
              icon.save(dpath + '/ic_launcher_round.png')
          print('App icons generated for all densities')
          PYEOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: karthik-fitness-app
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
