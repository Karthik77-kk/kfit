name: kfit
description: Personal fitness tracker - fat loss & muscle retention
publish_to: 'none'
version: 2.3.0+111

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  fl_chart: ^0.68.0
  intl: ^0.19.0
  uuid: ^4.4.0
  cupertino_icons: ^1.0.8
  pedometer: ^4.1.1
  path_provider: ^2.1.2
  share_plus: ^10.0.0
  file_picker: ^8.0.0
  home_widget: ^0.7.0
  flutter_gemma: ^0.16.3
  permission_handler: ^11.3.1
  http: ^1.2.0
  flutter_animate: ^4.5.2
  skeletonizer: ^2.1.3
  animations: ^2.2.0
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf

# App launcher icon — generated from assets/icon/app_icon.png via:
#   dart run flutter_launcher_icons
# Adaptive icon (Android 8+) gets the device's rounded/squircle mask; the dark
# background blends with the artwork's own dark frame.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A0B"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
