name: karthik_fitness
description: Personal fitness tracker - fat loss & muscle retention
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  fl_chart: ^0.68.0
  intl: ^0.19.0
  uuid: ^4.4.0
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  cupertino_icons: ^1.0.8
  pedometer: ^4.1.1
  # home_widget removed: all versions 0.5.0+ include Jetpack Glance (incompatible
  # with AGP <9.1 / compileSdk <37), and 0.4.x is broken on Flutter 3.27.0.
  # Widget data is now written via SharedPreferences and triggered via MethodChannel.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
